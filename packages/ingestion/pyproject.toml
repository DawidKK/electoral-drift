[project]
name = "electoral-ingestion"
version = "0.1.0"
description = "Data ingestion utilities for electoral drift source data."
requires-python = ">=3.14"
dependencies = [
    "electoral-db",
    "sqlalchemy>=2.0.36",
]

[project.scripts]
electoral-import-regions = "electoral_ingestion.cli:import_regions_command"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["electoral_ingestion"]

[tool.uv.sources]
electoral-db = { workspace = true }
