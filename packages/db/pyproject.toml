[project]
name = "electoral-db"
version = "0.1.0"
description = "Database models, settings, and migrations for electoral drift."
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.14.0",
    "psycopg[binary]>=3.2.0",
    "sqlalchemy>=2.0.36",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["electoral_db"]
