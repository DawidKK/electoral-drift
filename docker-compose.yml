services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-electoral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-electoral}
      POSTGRES_DB: ${POSTGRES_DB:-electoral_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - electoral_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-electoral} -d ${POSTGRES_DB:-electoral_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@electoral.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-electoral}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - electoral_pgadmin_data:/var/lib/pgadmin

volumes:
  electoral_postgres_data:
  electoral_pgadmin_data:
